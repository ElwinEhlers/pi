<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pi-launcher</title>
<style>
  :root {
    --bg: #1a1b1e;
    --surface: #25262b;
    --surface2: #2c2e33;
    --border: #373a40;
    --accent: #4c6ef5;
    --accent-hover: #5c7cfa;
    --danger: #e03131;
    --text: #c1c2c5;
    --text-bright: #e9ecef;
    --text-dim: #868e96;
    --running: #2b8a3e;
    --running-border: #40c057;
    --radius: 8px;
    --gap: 1rem;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Topbar ── */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 1rem;
  }

  #topbar h1 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-bright);
    letter-spacing: 0.5px;
  }

  #topbar-actions {
    display: flex;
    gap: 0.5rem;
  }

  /* ── Buttons (shared) ── */
  .btn {
    padding: 0.45rem 0.9rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-bright);
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: var(--border); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

  .btn-icon {
    padding: 0.45rem 0.6rem;
    font-size: 1rem;
  }

  /* ── Layout ── */
  #content-area {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  #main {
    flex: 1;
    padding: 1.5rem;
    overflow-y: auto;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 340px;
    min-width: 240px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  #sidebar-tabs {
    display: flex;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-tab {
    flex: 1;
    padding: 0.6rem 1rem;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    transition: color 0.15s, border-color 0.15s;
  }
  .sidebar-tab:hover { color: var(--text-bright); }
  .sidebar-tab.active { color: var(--accent-hover); border-bottom-color: var(--accent); }

  .sidebar-panel {
    flex: 1;
    overflow-y: auto;
    padding: 0.85rem;
  }
  .sidebar-panel.hidden { display: none; }

  #piOutputHeader {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 0.6rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }

  #piOutputStatus {
    font-size: 10px;
    font-weight: 600;
    text-transform: none;
    letter-spacing: 0;
    white-space: nowrap;
  }

  #piOutputLog {
    font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    color: #a9dc76;
  }

  #piOutputEmpty {
    color: var(--text-dim);
    font-style: italic;
    font-size: 12px;
  }

  /* ── Prompt grid ── */
  #promptGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: var(--gap);
    margin-bottom: 1.5rem;
  }

  .prompt-btn {
    position: relative;
    height: 80px;
    padding: 0.75rem 1rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-bright);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    text-align: left;
    word-break: break-word;
    overflow: hidden;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    align-items: flex-start;
  }

  .prompt-btn:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .prompt-btn.running {
    border-color: var(--running-border);
    background: #1d2b22;
  }

  .prompt-btn .btn-label {
    flex: 1;
  }

  .prompt-btn .btn-delete {
    display: none;
    position: absolute;
    top: 4px;
    right: 4px;
    padding: 1px 5px;
    background: var(--danger);
    border: none;
    border-radius: 4px;
    color: #fff;
    font-size: 11px;
    cursor: pointer;
    line-height: 1.4;
  }

  .prompt-btn .btn-edit {
    display: none;
    position: absolute;
    top: 4px;
    right: 30px;
    padding: 1px 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    line-height: 1.4;
  }
  .prompt-btn .btn-edit:hover { color: var(--text-bright); background: var(--border); }

  .prompt-btn:hover .btn-delete { display: block; }
  .prompt-btn:hover .btn-edit { display: block; }

  .running-indicator {
    display: none;
    position: absolute;
    bottom: 6px;
    right: 8px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--running-border);
    animation: pulse 1s infinite;
  }
  .prompt-btn.running .running-indicator { display: block; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Group headers ── */
  .group-header {
    grid-column: 1 / -1;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--text-dim);
    padding-bottom: 0.4rem;
    margin-top: 0.25rem;
    border-bottom: 1px solid var(--border);
  }
  .group-header:first-child { margin-top: 0; }

  /* ── Empty state ── */
  #emptyState {
    text-align: center;
    padding: 3rem;
    color: var(--text-dim);
    display: none;
  }
  #emptyState.visible { display: block; }

  /* ── Tooltip ── */
  #outputTooltip {
    position: fixed;
    z-index: 9999;
    max-width: 420px;
    min-width: 260px;
    max-height: 320px;
    overflow-y: auto;
    background: #111214;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    pointer-events: none;
  }

  #outputTooltip .tooltip-header {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }

  #outputTooltip .tooltip-body {
    color: #a9dc76;
  }

  #outputTooltip .tooltip-empty {
    color: var(--text-dim);
    font-style: italic;
  }

  /* ── Modals ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .modal-overlay.hidden { display: none; }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    width: 440px;
    max-width: 95vw;
  }

  .modal-box h2 {
    font-size: 1rem;
    color: var(--text-bright);
    margin-bottom: 1.25rem;
  }

  .form-group {
    margin-bottom: 1rem;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 0.3rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-group input,
  .form-group textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.55rem 0.75rem;
    color: var(--text-bright);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-group input:focus,
  .form-group textarea:focus { border-color: var(--accent); }

  .form-group textarea {
    resize: vertical;
    min-height: 90px;
    font-family: "Cascadia Code", "Consolas", monospace;
    font-size: 12px;
    line-height: 1.5;
  }

  .form-error {
    font-size: 12px;
    color: #ff6b6b;
    margin-top: 0.75rem;
    min-height: 1.2em;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.5rem;
    margin-top: 1.25rem;
  }

  /* ── Status toast ── */
  #toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: #2b8a3e;
    color: #fff;
    padding: 0.6rem 1.1rem;
    border-radius: var(--radius);
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    z-index: 2000;
  }
  #toast.visible { opacity: 1; }

  /* ── Service buttons ── */
  #service-bar {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .svc-btn {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.35rem 0.75rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-bright);
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
  }
  .svc-btn:hover { background: var(--border); }
  .svc-btn:disabled { opacity: 0.5; cursor: default; }

  .svc-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .svc-dot.up   { background: var(--running-border); }
  .svc-dot.down { background: #e03131; }
  .svc-dot.starting { background: #f59f00; animation: pulse 1s infinite; }

  /* ── Model selector ── */
  #modelSelectorWrap {
    position: relative;
  }
  #modelSelectorWrap.hidden { display: none; }

  #modelBtn .model-arrow {
    opacity: 0.45;
    font-size: 10px;
    margin-left: 2px;
  }

  #modelDropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-y: auto;
    max-height: 280px;
    z-index: 500;
    min-width: 200px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.55);
  }
  #modelDropdown.hidden { display: none; }

  .model-item {
    padding: 0.5rem 0.85rem;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-bright);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .model-item:hover { background: var(--surface2); }
  .model-item.active { color: var(--accent-hover); }
  .model-item .model-check { width: 12px; font-size: 11px; color: var(--accent); flex-shrink: 0; }
  .model-item .model-size { margin-left: auto; font-size: 10px; color: var(--text-dim); padding-left: 1rem; }

  /* ── Ollama log (in sidebar) ── */
  #ollamaLog {
    font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    color: #a9dc76;
    min-height: 2em;
  }

  #ollamaLogEmpty {
    color: var(--text-dim);
    font-style: italic;
    font-size: 12px;
  }
</style>
</head>
<body>

<div id="topbar">
  <h1>pi-launcher</h1>
  <div id="service-bar">
    <button class="svc-btn" id="ollamaBtn" title="Ollama-Status prüfen / starten">
      <span class="svc-dot" id="ollamaDot"></span>
      <span id="ollamaLabel">Ollama</span>
    </button>
    <div id="modelSelectorWrap" class="hidden">
      <button class="svc-btn" id="modelBtn" title="Ollama-Modell wechseln">
        <span id="modelName">—</span>
        <span class="model-arrow">▾</span>
      </button>
      <div id="modelDropdown" class="hidden">
        <div id="modelList"></div>
      </div>
    </div>
    <button class="svc-btn" id="piTermBtn" title="Pi im Arbeitsverzeichnis öffnen">
      <span class="svc-dot" id="piDot"></span>
      <span id="piLabel">Pi öffnen</span>
    </button>
  </div>
  <div id="topbar-actions">
    <button class="btn btn-icon" id="settingsBtn" title="Einstellungen">⚙</button>
  </div>
</div>

<div id="content-area">

<div id="main">
  <div id="promptGrid"></div>
  <div id="emptyState">
    <p>Noch keine Prompts gespeichert.</p>
    <p style="margin-top:0.5rem; font-size:12px;">Klicke "+ Neuer Prompt" um zu starten.</p>
  </div>
  <button class="btn btn-primary" id="newPromptBtn">+ Neuer Prompt</button>
</div>

<div id="sidebar">
  <div id="sidebar-tabs">
    <button class="sidebar-tab active" data-tab="ollama">Ollama</button>
    <button class="sidebar-tab" data-tab="pi-output">Pi-Output</button>
  </div>
  <div id="sidebar-panel-ollama" class="sidebar-panel">
    <div id="ollamaLogEmpty" style="color:var(--text-dim);font-style:italic;font-size:12px;">Ollama-Log erscheint hier.</div>
    <div id="ollamaLog"></div>
  </div>
  <div id="sidebar-panel-pi-output" class="sidebar-panel hidden">
    <div id="piOutputHeader">
      <span id="piOutputTitle">Kein Output</span>
      <span id="piOutputStatus"></span>
    </div>
    <div id="piOutputEmpty">Noch kein Prompt ausgeführt.</div>
    <div id="piOutputLog"></div>
  </div>
</div>

</div><!-- /content-area -->

<!-- Hover tooltip -->
<div id="outputTooltip">
  <div class="tooltip-header" id="tooltipHeader"></div>
  <div id="tooltipBody"></div>
</div>

<!-- New/Edit Prompt modal -->
<div class="modal-overlay hidden" id="newPromptModal">
  <div class="modal-box">
    <h2 id="newPromptModalTitle">Neuer Prompt</h2>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="newName" placeholder="z.B. Aufgabe zusammenfassen" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Gruppe <span style="color:var(--text-dim);font-style:italic;text-transform:none;letter-spacing:0">(optional)</span></label>
      <input type="text" id="newGroup" placeholder="z.B. Entwicklung" autocomplete="off" list="groupList">
      <datalist id="groupList"></datalist>
    </div>
    <div class="form-group">
      <label>Prompt-Text</label>
      <textarea id="newPromptText" placeholder="Schreibe einen Prompt für pi..."></textarea>
    </div>
    <div style="display:flex;align-items:center;gap:0.55rem;margin-bottom:0.75rem;">
      <input type="checkbox" id="newComplete" style="width:auto;cursor:pointer;accent-color:var(--accent);flex-shrink:0">
      <label for="newComplete" style="font-size:12px;color:var(--text);cursor:pointer;user-select:none">Aufgabe vollständig abarbeiten</label>
    </div>
    <div class="form-error" id="newPromptError"></div>
    <div class="modal-actions">
      <button class="btn" id="cancelNewPrompt">Abbrechen</button>
      <button class="btn btn-primary" id="saveNewPrompt">Speichern</button>
    </div>
  </div>
</div>

<!-- Settings panel -->
<div class="modal-overlay hidden" id="settingsPanel">
  <div class="modal-box">
    <h2>Einstellungen</h2>
    <div class="form-group">
      <label>Arbeitsverzeichnis</label>
      <input type="text" id="workdirInput" placeholder="~/Desktop/pi-aufgaben">
    </div>
    <div class="form-error" id="settingsError"></div>
    <div class="modal-actions">
      <button class="btn" id="cancelSettings">Abbrechen</button>
      <button class="btn btn-primary" id="saveSettings">Speichern</button>
    </div>
    <div style="border-top:1px solid var(--border);margin-top:1.25rem;padding-top:1.1rem;">
      <div style="font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.75rem;">Prompts</div>
      <div style="display:flex;gap:0.5rem;">
        <button class="btn" id="exportBtn" style="flex:1">↓ Exportieren</button>
        <button class="btn" id="importBtn" style="flex:1">↑ Importieren</button>
      </div>
      <div class="form-error" id="importError"></div>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </div>
</div>

<div id="toast"></div>

<script>
const SERVER = "http://localhost:8765";
const LS_KEY = "pi_launcher_prompts";

const state = {
  prompts: [],
  outputBuffers: {},
  runningIds: new Set(),
  workdir: "",
};

let currentTooltipId = null;

// ── Persistence ──────────────────────────────────────────────────────────────

async function loadConfig() {
  try {
    const res = await fetch(`${SERVER}/config`);
    if (res.ok) {
      const data = await res.json();
      state.workdir = data.workdir || "";
    }
  } catch {}
}

async function loadPrompts() {
  // Try server first (persistent), fall back to localStorage
  try {
    const res = await fetch(`${SERVER}/prompts`);
    if (res.ok) {
      const data = await res.json();
      if (Array.isArray(data) && data.length > 0) {
        state.prompts = data;
        // Keep localStorage in sync
        localStorage.setItem(LS_KEY, JSON.stringify(state.prompts));
        return;
      }
    }
  } catch {}
  // Fallback: localStorage (server not running yet)
  try {
    state.prompts = JSON.parse(localStorage.getItem(LS_KEY)) || [];
  } catch {
    state.prompts = [];
  }
}

function savePrompts() {
  // Save to localStorage immediately (synchronous, no flicker)
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(state.prompts));
  } catch {}
  // Then persist to server file (async, fire-and-forget)
  fetch(`${SERVER}/prompts`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(state.prompts),
  }).catch(() => {});
}

function genId() {
  if (typeof crypto !== "undefined" && crypto.randomUUID) {
    return crypto.randomUUID();
  }
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ── Rendering ────────────────────────────────────────────────────────────────

function getGroups() {
  const groups = [...new Set(state.prompts.map(p => p.group || ""))];
  return groups.sort((a, b) => {
    if (!a) return -1;   // ungrouped first
    if (!b) return 1;
    return a.localeCompare(b);
  });
}

function renderGrid() {
  const grid = document.getElementById("promptGrid");
  const empty = document.getElementById("emptyState");
  grid.innerHTML = "";

  if (state.prompts.length === 0) {
    empty.classList.add("visible");
    return;
  }

  empty.classList.remove("visible");

  const groups = getGroups();
  const hasNamedGroups = groups.some(g => g !== "");

  for (const group of groups) {
    const inGroup = state.prompts.filter(p => (p.group || "") === group);

    if (hasNamedGroups && group) {
      const header = document.createElement("div");
      header.className = "group-header";
      header.textContent = group;
      grid.appendChild(header);
    }

    for (const p of inGroup) {
      grid.appendChild(createPromptButton(p));
    }
  }
}

function createPromptButton(p) {
  const btn = document.createElement("button");
  btn.className = "prompt-btn";
  btn.dataset.id = p.id;
  if (state.runningIds.has(p.id)) btn.classList.add("running");

  const label = document.createElement("span");
  label.className = "btn-label";
  label.textContent = p.name;

  const edit = document.createElement("button");
  edit.className = "btn-edit";
  edit.textContent = "✎";
  edit.title = "Bearbeiten";
  edit.addEventListener("click", (e) => {
    e.stopPropagation();
    openEditPromptModal(p);
  });

  const del = document.createElement("button");
  del.className = "btn-delete";
  del.textContent = "✕";
  del.title = "Löschen";
  del.addEventListener("click", (e) => {
    e.stopPropagation();
    deletePrompt(p.id);
  });

  const indicator = document.createElement("span");
  indicator.className = "running-indicator";

  btn.appendChild(label);
  btn.appendChild(edit);
  btn.appendChild(del);
  btn.appendChild(indicator);

  btn.addEventListener("click", () => runPrompt(p.id));
  btn.addEventListener("mouseenter", (e) => showTooltip(e, p.id, p.name));
  btn.addEventListener("mouseleave", hideTooltip);
  btn.addEventListener("mousemove", repositionTooltip);

  return btn;
}

function deletePrompt(id) {
  state.prompts = state.prompts.filter(p => p.id !== id);
  delete state.outputBuffers[id];
  savePrompts();
  renderGrid();
}

function setButtonRunning(id, running) {
  const btn = document.querySelector(`.prompt-btn[data-id="${id}"]`);
  if (btn) btn.classList.toggle("running", running);
}

// ── Run + SSE ─────────────────────────────────────────────────────────────────

function runPrompt(id) {
  if (state.runningIds.has(id)) return;

  const p = state.prompts.find(x => x.id === id);
  if (!p) return;

  state.outputBuffers[id] = "";
  state.runningIds.add(id);
  setButtonRunning(id, true);
  updateTooltipIfVisible(id);

  sidebarActiveOutputId = id;
  switchSidebarTab("pi-output");
  updateSidebarPiOutput(id);

  const promptText = p.complete
    ? p.prompt + "\n\nArbeite die Aufgabe vollständig ab."
    : p.prompt;
  streamRun(id, promptText);
}

async function streamRun(id, promptText) {
  let response;
  try {
    response = await fetch(`${SERVER}/run`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: promptText, workdir: state.workdir }),
    });
  } catch (err) {
    state.outputBuffers[id] = `[Verbindungsfehler: ${err.message}]\n[Läuft server.py? python server.py]`;
    onRunComplete(id);
    return;
  }

  if (!response.ok) {
    state.outputBuffers[id] = `[Server-Fehler: HTTP ${response.status}]`;
    onRunComplete(id);
    return;
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder("utf-8");
  let sseBuffer = "";

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      sseBuffer += decoder.decode(value, { stream: true });

      // Split on double-newline (SSE message boundary)
      const messages = sseBuffer.split("\n\n");
      sseBuffer = messages.pop(); // keep incomplete tail

      for (const msg of messages) {
        if (!msg.trim()) continue;

        let eventType = "message";
        const dataLines = [];

        for (const line of msg.split("\n")) {
          if (line.startsWith("event: ")) {
            eventType = line.slice(7).trim();
          } else if (line.startsWith("data: ")) {
            dataLines.push(line.slice(6));
          }
        }

        if (eventType === "done") {
          onRunComplete(id);
          return;
        }

        if (dataLines.length > 0) {
          state.outputBuffers[id] += dataLines.join("\n") + "\n";
          updateTooltipIfVisible(id);
          updateSidebarPiOutput(id);
        }
      }
    }
  } catch (err) {
    if (!(err.name === "AbortError")) {
      state.outputBuffers[id] += `\n[Lesefehler: ${err.message}]`;
    }
  }

  onRunComplete(id);
}

function onRunComplete(id) {
  state.runningIds.delete(id);
  setButtonRunning(id, false);
  updateTooltipIfVisible(id);
  updateSidebarPiOutput(id);
}

// ── Tooltip ───────────────────────────────────────────────────────────────────

const tooltip = document.getElementById("outputTooltip");
const tooltipHeader = document.getElementById("tooltipHeader");
const tooltipBody = document.getElementById("tooltipBody");

function showTooltip(event, id, name) {
  currentTooltipId = id;
  tooltipHeader.textContent = name + (state.runningIds.has(id) ? " · läuft…" : "");

  const buf = state.outputBuffers[id];
  if (buf && buf.trim()) {
    tooltipBody.className = "tooltip-body";
    tooltipBody.textContent = buf;
  } else {
    tooltipBody.className = "tooltip-empty";
    tooltipBody.textContent = "Noch nicht ausgeführt — klicken zum Starten";
  }

  tooltip.style.display = "block";
  positionTooltip(event.clientX, event.clientY);
  tooltip.scrollTop = tooltip.scrollHeight;
}

function repositionTooltip(event) {
  if (tooltip.style.display === "block") {
    positionTooltip(event.clientX, event.clientY);
  }
}

function hideTooltip() {
  tooltip.style.display = "none";
  currentTooltipId = null;
}

function positionTooltip(cx, cy) {
  const offset = 16;
  const tw = tooltip.offsetWidth || 300;
  const th = tooltip.offsetHeight || 200;
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  let left = cx + offset;
  let top = cy + offset;

  if (left + tw > vw - 8) left = cx - tw - offset;
  if (top + th > vh - 8) top = cy - th - offset;

  left = Math.max(8, left);
  top = Math.max(8, top);

  tooltip.style.left = left + "px";
  tooltip.style.top = top + "px";
}

function updateTooltipIfVisible(id) {
  if (currentTooltipId !== id) return;

  const p = state.prompts.find(x => x.id === id);
  tooltipHeader.textContent = (p ? p.name : id) + (state.runningIds.has(id) ? " · läuft…" : " · fertig");

  const buf = state.outputBuffers[id];
  if (buf && buf.trim()) {
    tooltipBody.className = "tooltip-body";
    tooltipBody.textContent = buf;
    tooltip.scrollTop = tooltip.scrollHeight;
  } else {
    tooltipBody.className = "tooltip-empty";
    tooltipBody.textContent = "Noch nicht ausgeführt — klicken zum Starten";
  }
}

// ── New / Edit Prompt modal ───────────────────────────────────────────────────

let editingId = null;

function _populateGroupList() {
  const dl = document.getElementById("groupList");
  dl.innerHTML = "";
  getGroups().filter(g => g).forEach(g => {
    const opt = document.createElement("option");
    opt.value = g;
    dl.appendChild(opt);
  });
}

function openNewPromptModal() {
  editingId = null;
  document.getElementById("newPromptModalTitle").textContent = "Neuer Prompt";
  document.getElementById("newName").value = "";
  document.getElementById("newGroup").value = "";
  document.getElementById("newPromptText").value = "";
  document.getElementById("newComplete").checked = false;
  document.getElementById("newPromptError").textContent = "";
  _populateGroupList();
  document.getElementById("newPromptModal").classList.remove("hidden");
  document.getElementById("newName").focus();
}

function openEditPromptModal(p) {
  editingId = p.id;
  document.getElementById("newPromptModalTitle").textContent = "Prompt bearbeiten";
  document.getElementById("newName").value = p.name;
  document.getElementById("newGroup").value = p.group || "";
  document.getElementById("newPromptText").value = p.prompt;
  document.getElementById("newComplete").checked = !!p.complete;
  document.getElementById("newPromptError").textContent = "";
  _populateGroupList();
  document.getElementById("newPromptModal").classList.remove("hidden");
  document.getElementById("newName").focus();
}

function closeNewPromptModal() {
  document.getElementById("newPromptModal").classList.add("hidden");
}

function saveNewPrompt() {
  const name = document.getElementById("newName").value.trim();
  const prompt = document.getElementById("newPromptText").value.trim();
  const group = document.getElementById("newGroup").value.trim();
  const complete = document.getElementById("newComplete").checked;
  const err = document.getElementById("newPromptError");

  if (!name) { err.textContent = "Bitte einen Namen eingeben."; return; }
  if (!prompt) { err.textContent = "Bitte einen Prompt-Text eingeben."; return; }

  if (editingId) {
    const idx = state.prompts.findIndex(p => p.id === editingId);
    if (idx !== -1) {
      const entry = { id: editingId, name, prompt };
      if (group) entry.group = group;
      if (complete) entry.complete = true;
      state.prompts[idx] = entry;
    }
    showToast("Prompt aktualisiert");
  } else {
    const entry = { id: genId(), name, prompt };
    if (group) entry.group = group;
    if (complete) entry.complete = true;
    state.prompts.push(entry);
    showToast("Prompt gespeichert");
  }

  savePrompts();
  renderGrid();
  closeNewPromptModal();
}

// ── Export / Import ───────────────────────────────────────────────────────────

function exportPrompts() {
  const json = JSON.stringify(state.prompts, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `pi-prompts-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`${state.prompts.length} Prompts exportiert`);
}

function importPrompts(file) {
  const err = document.getElementById("importError");
  err.textContent = "";
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error("Kein Array");

      // Validate basic shape
      const valid = imported.filter(p => p && typeof p.name === "string" && typeof p.prompt === "string");
      if (valid.length === 0) throw new Error("Keine gültigen Prompts gefunden");

      // Merge: existing IDs get updated, new IDs get added
      const existingIds = new Set(state.prompts.map(p => p.id));
      let added = 0, updated = 0;
      for (const p of valid) {
        if (!p.id) p.id = genId();
        if (existingIds.has(p.id)) {
          const idx = state.prompts.findIndex(x => x.id === p.id);
          state.prompts[idx] = p;
          updated++;
        } else {
          state.prompts.push(p);
          added++;
        }
      }

      savePrompts();
      renderGrid();
      const msg = [added && `${added} neu`, updated && `${updated} aktualisiert`].filter(Boolean).join(", ");
      showToast(`Importiert: ${msg}`);
    } catch (ex) {
      err.textContent = `Fehler: ${ex.message}`;
    }
  };
  reader.readAsText(file);
}

// ── Settings panel ────────────────────────────────────────────────────────────

async function openSettings() {
  document.getElementById("settingsError").textContent = "";
  document.getElementById("settingsPanel").classList.remove("hidden");

  try {
    const res = await fetch(`${SERVER}/config`);
    if (res.ok) {
      const data = await res.json();
      document.getElementById("workdirInput").value = data.workdir || "";
    }
  } catch {
    document.getElementById("settingsError").textContent =
      "Server nicht erreichbar. Läuft python server.py?";
  }

  document.getElementById("workdirInput").focus();
}

function closeSettings() {
  document.getElementById("settingsPanel").classList.add("hidden");
}

async function saveSettings() {
  const workdir = document.getElementById("workdirInput").value.trim();
  const err = document.getElementById("settingsError");

  if (!workdir) { err.textContent = "Bitte ein Verzeichnis eingeben."; return; }

  try {
    const res = await fetch(`${SERVER}/config`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ workdir }),
    });
    if (res.ok) {
      state.workdir = workdir;
      closeSettings();
      showToast("Einstellungen gespeichert");
    } else {
      const data = await res.json().catch(() => ({}));
      err.textContent = data.error || `Server-Fehler: HTTP ${res.status}`;
    }
  } catch (e) {
    err.textContent = `Verbindungsfehler: ${e.message}`;
  }
}

// ── Sidebar ───────────────────────────────────────────────────────────────────

let sidebarActiveOutputId = null;

function switchSidebarTab(tab) {
  document.querySelectorAll(".sidebar-tab").forEach(t => {
    t.classList.toggle("active", t.dataset.tab === tab);
  });
  document.getElementById("sidebar-panel-ollama").classList.toggle("hidden", tab !== "ollama");
  document.getElementById("sidebar-panel-pi-output").classList.toggle("hidden", tab !== "pi-output");
}

function updateSidebarPiOutput(id) {
  if (id !== sidebarActiveOutputId) return;

  const p = state.prompts.find(x => x.id === id);
  const buf = state.outputBuffers[id] || "";
  const running = state.runningIds.has(id);

  document.getElementById("piOutputTitle").textContent = p ? p.name : "—";

  const status = document.getElementById("piOutputStatus");
  if (running) {
    status.textContent = "● läuft";
    status.style.color = "#f59f00";
  } else if (buf) {
    status.textContent = "✓ fertig";
    status.style.color = "#40c057";
  } else {
    status.textContent = "";
  }

  const log = document.getElementById("piOutputLog");
  const empty = document.getElementById("piOutputEmpty");

  if (buf.trim()) {
    empty.style.display = "none";
    log.textContent = buf;
    const panel = document.getElementById("sidebar-panel-pi-output");
    panel.scrollTop = panel.scrollHeight;
  } else {
    empty.style.display = "block";
    log.textContent = "";
  }
}

// ── Service status ────────────────────────────────────────────────────────────

let ollamaStarting = false;

async function pollServiceStatus() {
  try {
    const res = await fetch(`${SERVER}/service/status`);
    if (res.ok) {
      const data = await res.json();
      updateOllamaStatus(data.ollama);
      updatePiStatus(data.pi);
    }
  } catch {
    updateOllamaStatus(null);
    updatePiStatus(null);
  }
}

let _ollamaWasRunning = false;

function updateOllamaStatus(running) {
  if (ollamaStarting) return;
  const dot = document.getElementById("ollamaDot");
  const label = document.getElementById("ollamaLabel");
  const btn = document.getElementById("ollamaBtn");

  if (running === null) {
    dot.className = "svc-dot";
    label.textContent = "Ollama";
    btn.title = "pi-server nicht erreichbar";
    document.getElementById("modelSelectorWrap").classList.add("hidden");
    _ollamaWasRunning = false;
  } else if (running) {
    dot.className = "svc-dot up";
    label.textContent = "Ollama läuft";
    btn.title = "Ollama läuft auf Port 11434";
    if (!_ollamaWasRunning) loadModelSelector();
    _ollamaWasRunning = true;
  } else {
    dot.className = "svc-dot down";
    label.textContent = "Ollama starten";
    btn.title = "Klicken zum Starten";
    document.getElementById("modelSelectorWrap").classList.add("hidden");
    _ollamaWasRunning = false;
  }
}

function updatePiStatus(running) {
  const dot = document.getElementById("piDot");
  const label = document.getElementById("piLabel");

  if (running === null || running === false) {
    dot.className = "svc-dot down";
    label.textContent = "Pi öffnen";
  } else {
    dot.className = "svc-dot up";
    label.textContent = "Pi läuft";
  }
}

function startStatusPolling() {
  pollServiceStatus();
  setInterval(pollServiceStatus, 3000);
}

// ── Model selector ───────────────────────────────────────────────────────────

let currentModel = null;
let modelList = [];

async function loadModelSelector() {
  try {
    const [modelsRes, settingsRes] = await Promise.all([
      fetch(`${SERVER}/models`),
      fetch(`${SERVER}/pi-settings`),
    ]);
    if (modelsRes.ok) {
      const data = await modelsRes.json();
      modelList = (data.models || []).map(m => ({
        name: m.name.replace(/:latest$/, ""),
        fullName: m.name,
        size: m.size,
      }));
    }
    if (settingsRes.ok) {
      const settings = await settingsRes.json();
      currentModel = settings.defaultModel || null;
    }
  } catch {}
  renderModelList();
}

function renderModelList() {
  const list = document.getElementById("modelList");
  const wrap = document.getElementById("modelSelectorWrap");
  const nameEl = document.getElementById("modelName");

  list.innerHTML = "";

  if (modelList.length === 0) {
    wrap.classList.add("hidden");
    return;
  }

  wrap.classList.remove("hidden");
  nameEl.textContent = currentModel || modelList[0].name;

  for (const m of modelList) {
    const item = document.createElement("div");
    item.className = "model-item" + (m.name === currentModel ? " active" : "");

    const check = document.createElement("span");
    check.className = "model-check";
    check.textContent = m.name === currentModel ? "✓" : "";

    const nameSpan = document.createElement("span");
    nameSpan.textContent = m.name;

    const sizeSpan = document.createElement("span");
    sizeSpan.className = "model-size";
    if (m.size) sizeSpan.textContent = (m.size / 1e9).toFixed(1) + " GB";

    item.appendChild(check);
    item.appendChild(nameSpan);
    item.appendChild(sizeSpan);
    item.addEventListener("click", () => selectModel(m.name));
    list.appendChild(item);
  }
}

async function selectModel(name) {
  currentModel = name;
  document.getElementById("modelName").textContent = name;
  closeModelDropdown();
  renderModelList();

  try {
    const res = await fetch(`${SERVER}/pi-settings`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ defaultModel: name }),
    });
    showToast(res.ok ? `Modell: ${name}` : "Fehler beim Speichern");
  } catch (err) {
    showToast(`Fehler: ${err.message}`);
  }
}

function toggleModelDropdown() {
  document.getElementById("modelDropdown").classList.toggle("hidden");
}

function closeModelDropdown() {
  document.getElementById("modelDropdown").classList.add("hidden");
}

// ── Start Ollama ──────────────────────────────────────────────────────────────

async function startOllama() {
  if (ollamaStarting) return;

  ollamaStarting = true;
  const dot = document.getElementById("ollamaDot");
  const label = document.getElementById("ollamaLabel");
  const log = document.getElementById("ollamaLog");

  dot.className = "svc-dot starting";
  label.textContent = "Startet…";
  log.textContent = "";
  document.getElementById("ollamaLogEmpty").style.display = "none";
  switchSidebarTab("ollama");

  let response;
  try {
    response = await fetch(`${SERVER}/service/start-ollama`, { method: "POST" });
  } catch (err) {
    log.textContent = `Verbindungsfehler: ${err.message}\nLäuft server.py?`;
    ollamaStarting = false;
    pollServiceStatus();
    return;
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder("utf-8");
  let sseBuffer = "";

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      sseBuffer += decoder.decode(value, { stream: true });
      const messages = sseBuffer.split("\n\n");
      sseBuffer = messages.pop();

      for (const msg of messages) {
        if (!msg.trim()) continue;
        let eventType = "message";
        const dataLines = [];
        for (const line of msg.split("\n")) {
          if (line.startsWith("event: ")) eventType = line.slice(7).trim();
          else if (line.startsWith("data: ")) dataLines.push(line.slice(6));
        }
        if (eventType === "done") {
          ollamaStarting = false;
          pollServiceStatus();
          return;
        }
        if (dataLines.length > 0) {
          log.textContent += dataLines.join("\n") + "\n";
          log.scrollTop = log.scrollHeight;
        }
      }
    }
  } catch (err) {
    log.textContent += `\n[Lesefehler: ${err.message}]`;
  }

  ollamaStarting = false;
  pollServiceStatus();
}

// ── Open Pi terminal ──────────────────────────────────────────────────────────

async function openPiTerminal() {
  try {
    const res = await fetch(`${SERVER}/service/open-pi`, { method: "POST" });
    if (res.ok) {
      showToast("Pi-Terminal geöffnet");
      // Short delay so the process is registered before first poll
      setTimeout(pollServiceStatus, 500);
    } else {
      const data = await res.json().catch(() => ({}));
      showToast(`Fehler: ${data.error || res.status}`);
    }
  } catch (err) {
    showToast(`Verbindungsfehler: ${err.message}`);
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────────

let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("visible");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("visible"), 2200);
}

// ── Event wiring ──────────────────────────────────────────────────────────────

document.getElementById("newPromptBtn").addEventListener("click", openNewPromptModal);
document.getElementById("saveNewPrompt").addEventListener("click", saveNewPrompt);
document.getElementById("cancelNewPrompt").addEventListener("click", closeNewPromptModal);

document.getElementById("settingsBtn").addEventListener("click", openSettings);
document.getElementById("saveSettings").addEventListener("click", saveSettings);
document.getElementById("cancelSettings").addEventListener("click", closeSettings);
document.getElementById("exportBtn").addEventListener("click", exportPrompts);
document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", (e) => {
  if (e.target.files[0]) {
    importPrompts(e.target.files[0]);
    e.target.value = ""; // reset so same file can be re-imported
  }
});

document.getElementById("ollamaBtn").addEventListener("click", startOllama);
document.getElementById("modelBtn").addEventListener("click", (e) => {
  e.stopPropagation();
  toggleModelDropdown();
});
document.getElementById("piTermBtn").addEventListener("click", openPiTerminal);
// Close modals on overlay click
document.getElementById("newPromptModal").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) closeNewPromptModal();
});
document.getElementById("settingsPanel").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) closeSettings();
});

// Enter key in new prompt modal
document.getElementById("newName").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("newPromptText").focus();
});
document.getElementById("newPromptText").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) saveNewPrompt();
});

// Enter key in settings
document.getElementById("workdirInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") saveSettings();
});

// Escape closes modals
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    closeNewPromptModal();
    closeSettings();
    closeModelDropdown();
  }
});

// Tab switching
document.querySelectorAll(".sidebar-tab").forEach(tab => {
  tab.addEventListener("click", () => switchSidebarTab(tab.dataset.tab));
});

// Click outside closes model dropdown
document.addEventListener("click", () => closeModelDropdown());

// ── Init ──────────────────────────────────────────────────────────────────────

Promise.all([loadPrompts(), loadConfig()]).then(() => {
  renderGrid();
  startStatusPolling();
});
